    function getCrashPoint(){
        crashPointRange = Math.random() * 100;

        } else if(crashPointRange < 80){
            crashPointMaximum = 5;
        } else if(crashPointRange > 80){
            if(crashPointRange < 95){

            } else if(crashPointRange > 95){

            };

            crashPointRange = Math.random() * 10;
        } else if(crashPointMaximum == 15){
            crashPointRange = Math.random() * 15;
        };
        crashPoint = crashPointMaximum - crashPointRange;
        crashPoint = crashPoint * 10;
        crashPoint = Math.round(crashPoint);
        crashPoint = crashPoint / 10;
        crashPoint = crashPoint + 1;
    };

    function calculateInterest(){
        const loanAmount = parseFloat(document.getElementById('loanAmountInput').value);
        const loanLength = parseFloat(document.getElementById('loanLengthInput').value);
        if(!loanAmount){
            document.getElementById('loanAmountInput').focus();
            document.getElementById('loanAmountInput').value = "";
            alert("PLEASE ENTER LOAN AMOUNT");
        } else if(!loanLength){
            document.getElementById('loanLengthInput').focus();
            document.getElementById('loanLengthInput').value = "";
            alert("PLEASE ENTER LOAN LENGTH");
        } else{
            if(loanAmount < 0){
                document.getElementById('loanAmountInput').focus();
                document.getElementById('loanAmountInput').value = "";
                alert("INVALID LOAN AMOUNT");
            } else if(loanAmount > maxLoan){
                document.getElementById('loanAmountInput').focus();
                document.getElementById('loanAmountInput').value = "";
                alert("INVALID LOAN AMOUNT");
            } else {
                if(loanLength < 10){
                    document.getElementById('loanLengthInput').focus();
                    document.getElementById('loanLengthInput').value = "";
                    alert("LOAN MUST AT LEAST BE 10 SECONDS");
                } else if(loanLength > 180){
                    document.getElementById('loanLengthInput').focus();
                    document.getElementById('loanLengthInput').value = "";
                    alert("LOAN CANNOT EXCEED 3 MINUTES (180 SECONDS)");
                } else{
                    loanInterest = .25 * loanLength;
                    loanInterest /= 100;
                    loanInterest *= loanAmount;
                    loanInterest += loanAmount;
                    
                    takeOutLoanButton.disabled = false;
                    document.getElementById('interestLabel').innerText = "Debt With Interest: " + loanInterest;
                };
            };
        };
    };

    function takeOutLoan(){

        const loanAmount = parseFloat(document.getElementById('loanAmountInput').value);
        const startTime = Date.now();
        const durationMs = loanLength * 1000;
        const timerBar = document.getElementById('timerBar');
        variable -= 1;
        variable += loanAmount;
        updateEngine();
    
        clearInterval(ticker2);
        ticker2 = setInterval(() => {
            const elapsed = Date.now() - startTime;
            let progress = ((durationMs - elapsed) / durationMs) * 100;
    
            if (progress <= 0) {
                progress = 100;
                clearInterval(ticker2);
                mayDay();
            }
    
            timerBar.style.width = progress + "%";
        }, 50);
    }

    function payDebt(){

        updateEngine();

    };
