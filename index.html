    let variable = 0;
    let lifeTimeEarnings = 0;
    let maxLoan = 0;

    function ilikemoney(){
        variable = 99999999;
        updateEngine();
        dagestanUpgradeAvailable = true;
        buyDagestanUpgrade();
        buyCrash();
        buyBlackJack();
    };
    
    function updateEngine() {
        variable = variable + 1;
        lifeTimeEarnings = lifeTimeEarnings + 1;
        document.getElementById('updateTs').innerText = "pesos🤑: " + variable;
        maxLoan = 0.35 * lifeTimeEarnings;
        maxLoan = Math.round(maxLoan);
        document.getElementById('maxLoanLabel').innerText = "Max Loan: " + maxLoan;
    };

    let workersOwned = 0;
    let workerPrice = 10;
    let workersMaxed = false;
    let dagestanUpgradeAvailable = false;
    let dagestanUpgrade = false;

    function buyWorker(){
        if(variable > (workerPrice - 1)){
            if(workersOwned < 15){
                variable = variable - workerPrice;
                workersOwned = workersOwned + 1;
                workerPrice = workersOwned * 20; //You need to update this to be exponential so its balanced
                document.getElementById('updateTs').innerText = "pesos🤑: " + variable;
                document.getElementById('workersOwnedId').innerText = "Workers Owned🧑🏽‍🌾:"  + workersOwned;
                document.getElementById('buyWorkerButton').innerText = "buy a Worker(only " + workerPrice + " pesos🫰🤑💰)";
                if(workersOwned == 15){
                    if(workersMaxed == false){
                        document.getElementById('buyWorkerButton').innerText = "❌ MAXED OUT THERE BUB ❌";
                        document.getElementById('specialUpgradeLabel').innerText = "SPECIAL UPGRADE: DAGESTAN🏔";
                        document.getElementById('dagestanUpgradeButton').innerText = "BRATHA SEND THEM 2-3 YEARS DAGESTAN AND FORGET🏔🤼🐻 (5,000 pesos)";
                        dagestanUpgradeAvailable = true;
                        workersMaxed = true;
                    };   
                };
            }; 
        };
    };

    function makeWorkersWork(){
        if(dagestanUpgrade == true){
            variable = variable + workersOwned * 10;
            lifeTimeEarnings = lifeTimeEarnings + workersOwned * 10;
            maxLoan = 0.35 * lifeTimeEarnings;
            maxLoan = Math.round(maxLoan);
            document.getElementById('maxLoanLabel').innerText = "Max Loan: " + maxLoan;
        } else{
            variable = variable + workersOwned;
            lifeTimeEarnings = variable + workersOwned;
            maxLoan = 0.35 * lifeTimeEarnings;
            maxLoan = Math.round(maxLoan);
            document.getElementById('maxLoanLabel').innerText = "Max Loan: " + maxLoan;
        };
        document.getElementById('updateTs').innerText = "pesos🤑: " + variable;
    };

    function buyDagestanUpgrade(){
        if (dagestanUpgradeAvailable == true){
            if(variable > 4999)
            dagestanUpgrade = true;
            variable = variable - 5001;
            updateEngine();
            document.getElementById('dagestanUpgradeButton').innerText = "sent to dagestan✅";
            document.getElementById('buyCrashButton').innerText = "💠BUY CRASH💠 (10,000 pesos🫰🤑💰)";
            document.getElementById('sectionTwoLabel').innerText = "SECTION 2 : 💎CASINO💎";
        };
    };

    let crashPurchased = false;
    function buyCrash(){
        if(dagestanUpgrade == true){
            if(variable > 9999){
                variable = variable - 10000;
                const crashButtonElement = document.getElementById("buyCrashButton");
                crashButtonElement.style.visibility = "hidden";
                betDisplay.innerText = "Bet: 0";
                multiplierDisplay.innerText = "Multiplier: 1.00x";
                setBetButton.innerText = "Set Bet💵";
                crashStartButton.innerText = "Start📈";
                crashStopButton.innerText = "Stop🛑";
                crashPurchased = true;
                crashStopButton.disabled = true;
                document.getElementById('blackJackLabel').innerText = "♠BLACKJACK♠";
                document.getElementById('buyBlackJackButton').innerText = "♠BUY BLACKJACK♠(35,000 pesos🫰🤑💰)";
           };
        };
    };


    let crashPointRange = 0;
    let crashPointMaximum = 0;
    let crashPoint = 0;
    function getCrashPoint(){
        crashPointRange = Math.random() * 100;
        
        if(crashPointRange < 60){
          crashPointMaximum = 3;  
        } else if(crashPointRange < 80){
            crashPointMaximum = 5;
        } else if(crashPointRange > 80){
            if(crashPointRange < 95){
                crashPointMaximum = 10;
            } else if(crashPointRange > 95){
                crashPointMaximum = 15;
            };
        };
        if(crashPointMaximum == 3){
            crashPointRange = Math.random() * 3;
        } else if(crashPointMaximum == 5 ){
            crashPointRange = Math.random() * 5;
        } else if(crashPointMaximum == 10){
            crashPointRange = Math.random() * 10;
        } else if(crashPointMaximum == 15){
            crashPointRange = Math.random() * 15;
        };
        crashPoint = crashPointMaximum - crashPointRange;
        crashPoint = crashPoint * 10;
        crashPoint = Math.round(crashPoint);
        crashPoint = crashPoint / 10;
        crashPoint = crashPoint + 1;
    };

    let bet = 0;
    let crashDisplayStatus = 0;
    let crashPointGotten = false;

    function setBet(){
        if(crashPurchased == true){
        bet = prompt("How much ya wanna bet bubba?? (type a to go all in)");
        if (bet > variable){
            bet = 0;
            betDisplay.innerText = "Bet: " + bet;
        } else if(bet == 'a'){
            bet = variable;
            betDisplay.innerText = "Bet: " + bet;
        } else if(bet < 0){
            bet = 0;
            betDisplay.innerText = "Bet: " + bet;
        } else{
            betDisplay.innerText = "Bet: " + bet;
            multiplierDisplay.innerText = "Multiplier: 1.00x";
        };
            };
    };

    let ticker;
    let current = 1.00;
    let speed = 50;
    
    function startCrash(){
        if(crashPurchased == true){
            if(bet > 0){
                if(crashPointGotten == false)
                startTicker();
                getCrashPoint();
                crashPointGotten = true;
                crashStopButton.disabled = false;
            };
        };
    };

    function startTicker(){
        if(crashPurchased == true){

        current = 1.00;
        clearInterval(ticker);

        ticker = setInterval(() => {

            //what it does:
            current = current + 0.01;
            multiplierDisplay.innerText = current.toFixed(2) + "x";

            if(current >= crashPoint){
                stopTicker();   
            }
        }, speed);
        };
    };

    function stopTicker(){
        clearInterval(ticker);
        variable = variable - bet;
        variable = Math.round(variable) - 1;
        updateEngine();
        bet = 0;
        betDisplay.innerText = "Bet: 0"
        multiplierDisplay.innerText = "CRASHED💥💥 AT " + current.toFixed(2) + "x";
        crashStopButton.disabled = true;
        crashPointGotten = false;
    };

    function stopTickerPositive(){
        if(crashPurchased == true){
        bet = bet * current;
        variable = variable + bet;
        lifeTimeEarnings = variable + bet;
        variable = Math.round(variable) - 1;
        updateEngine();
        clearInterval(ticker);
        crashPointGotten = false;
        bet = 0;
        betDisplay.innerText = "Bet: 0"
        };
    };

    function toggleSettings(){
        document.getElementById("settingSection").classList.toggle("expanded");
    };

    let loanInterest;
    
    let takeOutLoanButton;
    let payDebtButton;
    let timerBarElement;

    window.onload = () => {
        takeOutLoanButton = document.getElementById('takeOutLoanButton');
        takeOutLoanButton.disabled = true;
        payDebtButton = document.getElementById('payDebtButton');
        payDebtButton.disabled = true;
        timerBarElement = document.getElementById('timerBar');
        timerBarElement.disabled = true;
        timerBarElement.style.opacity = "1";
        timerBarElement.style.cursor = "default";
    };
    
    function calculateInterest(){
        const loanAmount = parseFloat(document.getElementById('loanAmountInput').value);
        const loanLength = parseFloat(document.getElementById('loanLengthInput').value);
        if(!loanAmount){
            document.getElementById('loanAmountInput').focus();
            document.getElementById('loanAmountInput').value = "";
            alert("PLEASE ENTER LOAN AMOUNT");
        } else if(!loanLength){
            document.getElementById('loanLengthInput').focus();
            document.getElementById('loanLengthInput').value = "";
            alert("PLEASE ENTER LOAN LENGTH");
        } else{
            if(loanAmount < 0){
                document.getElementById('loanAmountInput').focus();
                document.getElementById('loanAmountInput').value = "";
                alert("INVALID LOAN AMOUNT");
            } else if(loanAmount > maxLoan){
                document.getElementById('loanAmountInput').focus();
                document.getElementById('loanAmountInput').value = "";
                alert("INVALID LOAN AMOUNT");
            } else {
                if(loanLength < 10){
                    document.getElementById('loanLengthInput').focus();
                    document.getElementById('loanLengthInput').value = "";
                    alert("LOAN MUST AT LEAST BE 10 SECONDS");
                } else if(loanLength > 180){
                    document.getElementById('loanLengthInput').focus();
                    document.getElementById('loanLengthInput').value = "";
                    alert("LOAN CANNOT EXCEED 3 MINUTES (180 SECONDS)");
                } else{
                    loanInterest = .25 * loanLength;
                    loanInterest /= 100;
                    loanInterest *= loanAmount;
                    loanInterest += loanAmount;
                    
                    takeOutLoanButton.disabled = false;
                    document.getElementById('interestLabel').innerText = "Debt With Interest: " + loanInterest;
                };
            };
        };
    };

    let ticker2;

    function takeOutLoan() {
        takeOutLoanButton.disabled = true;
        payDebtButton.disabled = false;
        const loanLength = parseFloat(document.getElementById('loanLengthInput').value);
        const startTime = Date.now();
        const durationMs = loanLength * 1000;
        const timerBar = document.getElementById('timerBar');
        variable -= 1;
        variable += loanAmount;
        updateEngine();
    
        clearInterval(ticker2);
        ticker2 = setInterval(() => {
            const elapsed = Date.now() - startTime;
            let progress = ((durationMs - elapsed) / durationMs) * 100;
    
            if (progress <= 0) {
                progress = 100;
                clearInterval(ticker2);
                mayDay();
            }
    
            timerBar.style.width = progress + "%";
        }, 50);
    }

    function payDebt(){
        if (loanInterest <= variable){
        clearInterval(ticker2);
        progress = 100;
        timerBar.style.width = progress + "%";
        payDebtButton.disabled = true;
        variable -= loanInterest;
        variable = Math.round(variable);
        variable -= 1;
        updateEngine();
        } else{
            alert("CARD DECLINED");
        };
    };

    function mayDay(){
        alert("YO SHI GETTING REPOSSESSED TWIN!!");
        
        workersOwned = 0;
        workerPrice = 10;
        workersMaxed = false;
        dagestanUpgradeAvailable = false;
        dagestanUpgrade = false;
        loanInterest *= 4;
        variable -= loanInterest;
        variable = Math.round(variable);
        updateEngine();
        document.getElementById('workersOwnedId').innerText = "Workers Owned🧑🏽‍🌾:"  + workersOwned;
        document.getElementById('buyWorkerButton').innerText = "buy a Worker(only " + workerPrice + " pesos🫰🤑💰)";
        document.getElementById('specialUpgradeLabel').innerText = "SPECIAL UPGRADE: DAGESTAN🏔";
        document.getElementById('dagestanUpgradeButton').innerText = "BRATHA SEND THEM 2-3 YEARS DAGESTAN AND FORGET🏔🤼🐻 (5,000 pesos)";
    };

    let blackJackPurchased = false;

    function buyBlackJack(){
        if(crashPurchased == true && variable > 34999){
            variable -= 35000;
            blackJackPurchased = true;
            document.getElementById('betDisplayBJ').innerText = "Bet: 0";
            document.getElementById('setBetButtonBJ').innerText = "Set Bet💰";

document.getElementById('startBjButton').innerText = "Start🃏";
            document.getElementById('hitButton').innerText = "Hit💥";
            document.getElementById('standButton').innerText = "Stand🛡️";
            document.getElementById('buyBlackJackButton').style.display = "none";
        };
    };
    
    let deck = [
      // Spades
      "🂡", "🂢", "🂣", "🂤", "🂥", "🂦", "🂧", "🂨", "🂩", "🂪", "🂫", "🂭", "🂮",
      // Hearts
      "🂱", "🂲", "🂳", "🂴", "🂵", "🂶", "🂷", "🂸", "🂹", "🂺", "🂻", "🂽", "🂾",
      // Diamonds
      "🃁", "🃂", "🃃", "🃄", "🃅", "🃆", "🃇", "🃈", "🃉", "🃊", "🃋", "🃍", "🃎",
      // Clubs
      "🃑", "🃒", "🃓", "🃔", "🃕", "🃖", "🃗", "🃘", "🃙", "🃚", "🃛", "🃝", "🃞"
    ];

    const cardValues = {
        // Spades
      "🂡": 11, "🂢": 2, "🂣": 3, "🂤": 4, "🂥": 5, "🂦": 6, "🂧": 7, "🂨": 8, "🂩": 9, "🂪": 10, "🂫": 10, "🂭": 10, "🂮": 10,
      // Hearts
      "🂱": 11, "🂲": 2, "🂳": 3, "🂴": 4, "🂵": 5, "🂶": 6, "🂷": 7, "🂸": 8, "🂹": 9, "🂺": 10, "🂻": 10, "🂽": 10, "🂾": 10,
      // Diamonds
      "🃁": 11, "🃂": 2, "🃃": 3, "🃄": 4, "🃅": 5, "🃆": 6, "🃇": 7, "🃈": 8, "🃉": 9, "🃊": 10, "🃋": 10, "🃍": 10, "🃎": 10,
      // Clubs
      "🃑": 11, "🃒": 2, "🃓": 3, "🃔": 4, "🃕": 5, "🃖": 6, "🃗": 7, "🃘": 8, "🃙": 9, "🃚": 10, "🃛": 10, "🃝": 10, "🃞": 10
    };

    let blackJackBet = 0;

    let dealerAceCount = 0;
    let cardValue;
    let cardValue2;
    let dynamicCardValue;
    let combinedValue;

    let playerAceCount = 0;
    let playerCardValue;
    let playerCardValue2;
    let dynamicPlayerCardValue;
    let playerCombinedValue

    let playerHand = [];
    let dealerHand = [];
    
    const blankCard = "🂠";

    const betDisplayBJ = document.getElementById('betDisplayBJ');

    function resetDeck(){
        deck = [
          // Spades
          "🂡", "🂢", "🂣", "🂤", "🂥", "🂦", "🂧", "🂨", "🂩", "🂪", "🂫", "🂭", "🂮",
          // Hearts
          "🂱", "🂲", "🂳", "🂴", "🂵", "🂶", "🂷", "🂸", "🂹", "🂺", "🂻", "🂽", "🂾",
          // Diamonds
          "🃁", "🃂", "🃃", "🃄", "🃅", "🃆", "🃇", "🃈", "🃉", "🃊", "🃋", "🃍", "🃎",
          // Clubs
          "🃑", "🃒", "🃓", "🃔", "🃕", "🃖", "🃗", "🃘", "🃙", "🃚", "🃛", "🃝", "🃞"
        ];

        playerHand = [];
        dealerHand = [];
        playerAceCount = 0;
        dealerAceCount = 0;
        blackJackBet = 0;
        document.getElementById('betDisplayBJ').innerText = "Bet: 0";
        
    };

    function setBetBlackJack(){
        blackJackBet = prompt("How much ya wanna bet bubba?? (type a to go all in)");
        if (blackJackBet > variable){
            blackJackBet = 0;
            document.getElementById('betDisplayBJ').innerText = "Bet: " + blackJackBet;
        } else if(blackJackBet == 'a'){
            blackJackBet = variable;
            document.getElementById('betDisplayBJ').innerText = "Bet: " + blackJackBet;
        } else if(blackJackBet < 0){
            blackJackBet = 0;
            document.getElementById('betDisplayBJ').innerText = "Bet: " + blackJackBet;
        } else{
            document.getElementById('betDisplayBJ').innerText = "Bet: " + blackJackBet;
        };
        blackJackBet = Number(blackJackBet);
    };

    function startBlackJack(){
        let index = Math.floor(Math.random() * deck.length);
        let randomCard = deck.splice(index, 1)[0];
        cardValue = cardValues[randomCard];
        dealerHand.push(cardValue);
        if(cardValue == 11){
            dealerAceCount += 1;
        };
        document.getElementById('dealersHand').innerText = randomCard;
        
        index = Math.floor(Math.random() * deck.length);
        randomCard = deck.splice(index, 1)[0];
        hiddenCard = randomCard;
        cardValue = cardValues[randomCard];
        dealerHand.push(cardValue);
        if(cardValue == 11){
            dealerAceCount += 1;
        };
        document.getElementById('dealersHand').innerText += blankCard;
        
        document.getElementById('combinedCardValueDealer').innerText = "??";

        combinedValue = dealerHand.reduce((total, val) => total + val, 0);
        if(combinedValue == 21){
            showDealersHand();
            alert("DEALER BLACKJACK!");

            blackJackBet *= 1.5;
            variable -= blackJackBet;
            variable -= 1;
            updateEngine();

            if(variable < 0){
                variable += blackJackBet;
                variable -= 1;
                updateEngine();
                mayDay();
            };
            
            blackJackBet = 0;
        };
        
        if (combinedValue == 22){
                combinedValue -= 10;
                dealerAceCount -= 1;
        };
        

        
        //PLAYER CARDS SECTION
        index = Math.floor(Math.random() * deck.length);
        randomCard = deck.splice(index, 1)[0];
        playerCardValue = cardValues[randomCard];
        playerHand.push(playerCardValue);
        if(playerCardValue == 11){
            playerAceCount += 1;
        };
        document.getElementById('playersHand').innerText = randomCard;

        index = Math.floor(Math.random() * deck.length);
        randomCard = deck.splice(index, 1)[0];
        playerCardValue = cardValues[randomCard];
        playerHand.push(playerCardValue);

        if(playerCardValue == 11){
            playerAceCount += 1;
        };
        document.getElementById('playersHand').innerText += randomCard;

        playerCombinedValue = playerHand.reduce((total, val) => total + val, 0);

        if (playerCombinedValue == 22){
                playerCombinedValue -= 10;
                playerAceCount -= 1;
        };

        if(playerCombinedValue == 21){
            alert("BLACKJACK!");
            blackJack();
        };

        document.getElementById('combinedCardValue').innerText = playerCombinedValue;  
    };

    function showDealersHand(){
        document.getElementById('dealersHand').innerText = document.getElementById('dealersHand').innerText.replace(blankCard, hiddenCard);
    };
    
    function stand(){
        showDealersHand();
        
        setTimeout(() => {
            dealerTurn(); 
        }, 1000);
    }

    function dealerTurn() {
        if (combinedValue < 17) {
            let index = Math.floor(Math.random() * deck.length);
            let randomCard = deck.splice(index, 1)[0];
            
            let val = cardValues[randomCard];
            dealerHand.push(val);
            if(val == 11) dealerAceCount += 1;
    
            // Update total using reduce
            combinedValue = dealerHand.reduce((total, val) => total + val, 0);
    
            // Dealer Ace Check
            if (combinedValue > 21 && dealerAceCount > 0) {
                combinedValue -= 10;
                dealerAceCount -= 1;
            }
    
            document.getElementById('dealersHand').innerText += randomCard;
            document.getElementById('combinedCardValueDealer').innerText = combinedValue;
    
            if (combinedValue > 21) {
                setTimeout(dealerBust, 500);
                return;
            }
            setTimeout(dealerTurn, 500); 
        } else {
            setTimeout(compareScores, 500);
        }
    }

    
    function compareScores() {
        if (playerCombinedValue > combinedValue) {
            alert("YOU WIN!");
            variable += blackJackBet;
            variable -= 1;
            updateEngine();
            resetDeck();
        } else {
            alert("YOU LOSE!");
            variable -= blackJackBet;
            variable -= 1;
            updateEngine();
            resetDeck();
        }
        
        cardValue = 0;
        cardValue2 = 0;
        dynamicCardValue = 0;
        combinedValue = 0;
    
        playerCardValue = 0;
        playerCardValue2 = 0;
        dynamicPlayerCardValue = 0;
        playerCombinedValue = 0;

        document.getElementById('playersHand').innerText = "";
        document.getElementById('dealersHand').innerText = "";
        document.getElementById('combinedCardValue').innerText = "";
        document.getElementById('combinedCardValueDealer').innerText = "";
    };


    function hit(){
        if(playerCombinedValue < 21){
            let index = Math.floor(Math.random() * deck.length);
            let randomCard = deck.splice(index, 1)[0];
            dynamicPlayerCardValue = cardValues[randomCard];
            playerHand.push(dynamicPlayerCardValue);

            if (dynamicPlayerCardValue === 11) {
                playerAceCount += 1;
            }

            
            playerCombinedValue = playerHand.reduce((total, val) => total + val, 0);
            document.getElementById('playersHand').innerText += randomCard;

            if (playerCombinedValue > 21 && playerAceCount > 0){
                playerCombinedValue -= 10;
                playerAceCount -= 1;
            };

            document.getElementById('combinedCardValue').innerText = playerCombinedValue;
            
            if(playerCombinedValue > 21){bust();};
            if(playerCombinedValue == 21){immediateWin();};
        };
    };

    function immediateWin(){
        alert("YOU WIN!");
        variable += blackJackBet;
        variable -= 1;
        updateEngine();
        resetDeck();
        cardValue = 0;
        cardValue2 = 0;
        dynamicCardValue = 0;
        combinedValue = 0;
    
        playerCardValue = 0;
        playerCardValue2 = 0;
        dynamicPlayerCardValue = 0;
        playerCombinedValue = 0;

        document.getElementById('playersHand').innerText = "";
        document.getElementById('dealersHand').innerText = "";
        document.getElementById('combinedCardValue').innerText = "";
        document.getElementById('combinedCardValueDealer').innerText = "";


    };

    function blackJack(){
        alert("BLACK JACK! YOU WIN!");
        blackJackBet *= 1.5;
        variable += blackJackBet;
        variable -= 1;
        updateEngine();
        resetDeck();
        cardValue = 0;
        cardValue2 = 0;
        dynamicCardValue = 0;
        combinedValue = 0;
    
        playerCardValue = 0;
        playerCardValue2 = 0;
        dynamicPlayerCardValue = 0;
        playerCombinedValue = 0;

        document.getElementById('playersHand').innerText = "";
        document.getElementById('dealersHand').innerText = "";
        document.getElementById('combinedCardValue').innerText = "";
        document.getElementById('combinedCardValueDealer').innerText = "";

    };

    function bust(){
        alert("BUST!");
        variable -= blackJackBet;
        variable -= 1;
        updateEngine();
        resetDeck();
        cardValue = 0;
        cardValue2 = 0;
        dynamicCardValue = 0;
        combinedValue = 0;
    
        playerCardValue = 0;
        playerCardValue2 = 0;
        dynamicPlayerCardValue = 0;
        playerCombinedValue = 0;

        document.getElementById('playersHand').innerText = "";
        document.getElementById('dealersHand').innerText = "";
        document.getElementById('combinedCardValue').innerText = "";
        document.getElementById('combinedCardValueDealer').innerText = "";

        
    };

    function dealerBust(){
        alert("DEALER BUST!");
        variable += blackJackBet;
        variable -= 1;
        updateEngine();
        resetDeck();
        cardValue = 0;
        cardValue2 = 0;
        dynamicCardValue = 0;
        combinedValue = 0;
    
        playerCardValue = 0;
        playerCardValue2 = 0;
        dynamicPlayerCardValue = 0;
        playerCombinedValue = 0;

        document.getElementById('playersHand').innerText = "";
        document.getElementById('dealersHand').innerText = "";
        document.getElementById('combinedCardValue').innerText = "";
        document.getElementById('combinedCardValueDealer').innerText = "";

        variable += blackJackBet;
        variable -= 1;
        updateEngine();
    };
</script>

/* 2. Main Dashboard Card (Cleaned up) */
.game-card {
    background: rgba(30, 41, 59, 0.7);
    backdrop-filter: blur(10px);
    padding: 2rem;
    border-radius: 24px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.4);
    border: 1px solid rgba(255,255,255,0.1);
    text-align: center;
    
    /* Ensure they don't grow too wide to stay side-by-side */
    width: 100%;
    max-width: 600px; 
    flex: 0 1 auto; 
}

            .vertical-stack {
    display: flex;
    flex-direction: column; /* This container stacks its children */
    gap: 20px;
}

        /* 3. Typography */
        h1, h2, p { margin: 10px 0; }
        .pesos-display {
            font-size: 2.5rem;
            color: #4ade80; /* Money Green */
            text-shadow: 0 0 15px rgba(74, 222, 128, 0.3);
        }
        
        .multiplier {
            font-size: 3.5rem;
            color: #38bdf8;
            font-weight: 800;
        }

        /* 4. The Giant Clicky Button */
        #clickButton {
            background: linear-gradient(135px, #6366f1, #a855f7);
            font-size: 1.5rem !important;
            padding: 30px !important;
            border-radius: 50% !important;
            width: 150px !important;
            height: 150px !important;
            margin: 20px auto !important;
            display: block;
            border: 4px solid rgba(255,255,255,0.2);
            cursor: pointer;
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.4);
            transition: all 0.3s ease;
        }

        #clickButton:hover {
            transform: scale(1.05); /* Grows just a tiny bit */
            filter: brightness(1.5); /* Lights up slightly */
            transition: all 0.2s ease;
        }

        /* 5. General Buttons */
        .btn, button {
            width: 100%;
            padding: 14px;
            margin: 8px 0;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.4s;
            color: white;
            background: #334155; /* Default gray-blue */
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            filter: brightness(1.2);
        }

        button:active:not(:disabled) { transform: scale(0.95); }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Specific Colors */
        #ILIKEMONEY { background: #eab308; color: #000; } /* Gold */
        #buyWorkerButton { background: #22c55e; }
        #makeWorkersWorkButton { background: #3b82f6; }
        #crashStartButton { background: #10b981; }
        #crashStopButton { background: #ef4444; }
        #setBetButton { background: #8b5cf6; }
        #hideLockedButton {
            transform: translateX(15px);
        }
        #secondSetting {
            transform: translateX(15px);
        }
        #settingsButton {
            padding: 16px;
            font-size: 1.5rem;
        }

        #settingSection {
            max-height: 0;
            overflow: hidden;

            transition: max-height 0.35s ease-out;

                position: relative; 
        }

        #settingSection.expanded {
            max-height: 200px;
        }

        #settingSection::before {
            content: "";          /* Required: This tells CSS to 'create' the shape */
            position: absolute;   /* Let us place it anywhere */
            top: 0;               /* Start at the top of the section */
            left: 15px;           /* Adjust this to line up with your Settings button center */
            width: 15px;           /* The thickness of the line */
            height: 100%;         /* Stretches to the bottom of the section */
            background: rgba(255, 255, 255, 0.3); /* Subtle white color */
        }

        #settingsButton:hover {
            transform: scale(1.05); /* Grows just a tiny bit */
            filter: brightness(1.5); /* Lights up slightly */
            transition: all 0.2s ease;
        }

        #timerBar {
            display: block;
            height: 10px;
            max-width: 550px;
            width: 100%;
            background: #ef4444;
        }

        #hitButton {
            background-color: #2ecc71;
        }

        #standButton {
            background-color: #e74c3c;
        }

        #setBetButtonBJ {
            background-color: #f1c40f;
        }

        #startBjButton {
            background-color: #3498db;
        }

    </style>


    <div id="verticalStack1" class="vertical-stack">
