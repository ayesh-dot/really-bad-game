<script>

    let variable = 0;

    function ilikemoney(){
        variable = 99999999;
        updateEngine();
    };
    
    function updateEngine() {
        variable = variable + 1;
        document.getElementById('updateTs').innerText = "pesos🤑: " + variable;
    };

    let workersOwned = 0;
    let workerPrice = 10;
    let workersMaxed = false;
    let dagestanUpgradeAvailable = false;
    let dagestanUpgrade = false;

    function buyWorker(){
        if(variable > (workerPrice - 1)){
            if(workersOwned < 15){
                variable = variable - workerPrice;
                workersOwned = workersOwned + 1;
                workerPrice = workersOwned * 20; //You need to update this to be exponential so its balanced
                document.getElementById('updateTs').innerText = "pesos🤑: " + variable;
                document.getElementById('workersOwnedId').innerText = "Workers Owned🧑🏽‍🌾:"  + workersOwned;
                document.getElementById('buyWorkerButton').innerText = "buy a Worker(only " + workerPrice + " pesos🫰🤑💰)";
                if(workersOwned == 15){
                    if(workersMaxed == false){
                        document.getElementById('buyWorkerButton').innerText = "❌ MAXED OUT THERE BUB ❌";
                        document.getElementById('specialUpgradeLabel').innerText = "SPECIAL UPGRADE: DAGESTAN🏔";
                        document.getElementById('dagestanUpgradeButton').innerText = "BRATHA SEND THEM 2-3 YEARS DAGESTAN AND FORGET🏔🤼🐻 (5,000 pesos)";
                        dagestanUpgradeAvailable = true;
                        workersMaxed = true;
                    };   
                };
            }; 
        };
    };

    function makeWorkersWork(){
        if(dagestanUpgrade == true){
            variable = variable + workersOwned * 10;
        } else{
            variable = variable + workersOwned;
        };
        document.getElementById('updateTs').innerText = "pesos🤑: " + variable;
    };

    function buyDagestanUpgrade(){
        if (dagestanUpgradeAvailable == true){
            if(variable > 4999)
            dagestanUpgrade = true;
            variable = variable - 5001;
            updateEngine();
            document.getElementById('dagestanUpgradeButton').innerText = "sent to dagestan✅";
            document.getElementById('buyCrashButton').innerText = "💠CRASH💠 (10,000 pesos🫰🤑💰)";
            document.getElementById('sectionTwoLabel').innerText = "SECTION 2 : 💎CASINO💎";
        };
    };

    let crashPurchased = false;
    function buyCrash(){
        if(dagestanUpgrade == true){
            if(variable > 9999){
                variable = variable - 10000;
                const crashButtonElement = document.getElementById("buyCrashButton");
                crashButtonElement.style.visibility = "hidden";
                betDisplay.innerText = "Bet: 0";
                multiplierDisplay.innerText = "Multiplier: 1.00x";
                setBetButton.innerText = "Set Bet💵";
                crashStartButton.innerText = "Start📈";
                crashStopButton.innerText = "Stop🛑";
                crashPurchased = true;
                crashStopButton.disabled = true;
           };
        };
    };


    let crashPointRange = 0;
    let crashPointMaximum = 0;
    let crashPoint = 0;
    function getCrashPoint(){
        crashPointRange = Math.random() * 100;
        
        if(crashPointRange < 60){
          crashPointMaximum = 3;  
        } else if(crashPointRange < 80){
            crashPointMaximum = 5;
        } else if(crashPointRange > 80){
            if(crashPointRange < 95){
                crashPointMaximum = 10;
            } else if(crashPointRange > 95){
                crashPointMaximum = 15;
            };
        };
        if(crashPointMaximum == 3){
            crashPointRange = Math.random() * 3;
        } else if(crashPointMaximum == 5 ){
            crashPointRange = Math.random() * 5;
        } else if(crashPointMaximum == 10){
            crashPointRange = Math.random() * 10;
        } else if(crashPointMaximum == 15){
            crashPointRange = Math.random() * 15;
        };
        crashPoint = crashPointMaximum - crashPointRange;
        crashPoint = crashPoint * 10;
        crashPoint = Math.round(crashPoint);
        crashPoint = crashPoint / 10;
        crashPoint = crashPoint + 1;
    };

    let bet = 0;
    let crashDisplayStatus = 0;
    let crashPointGotten = false;

    function setBet(){
        if(crashPurchased == true){
        bet = prompt("How much ya wanna bet bubba?? (type a to go all in)");
        if (bet > variable){
            bet = 0;
            betDisplay.innerText = "Bet: " + bet;
        } else if(bet == 'a'){
            bet = variable;
            betDisplay.innerText = "Bet: " + bet;
        } else{
            betDisplay.innerText = "Bet: " + bet;
            multiplierDisplay.innerText = "Multiplier: 1.00x";
        };
            };
    };

    let ticker;
    let current = 1.00;
    let speed = 50;
    
    function startCrash(){
        if(crashPurchased == true){
            if(bet > 0){
                if(crashPointGotten == false)
                startTicker();
                getCrashPoint();
                crashPointGotten = true;
                crashStopButton.disabled = false;
            };
        };
    };

    function startTicker(){
        if(crashPurchased == true){

        current = 1.00;
        clearInterval(ticker);

        ticker = setInterval(() => {

            //what it does:
            current = current + 0.01;
            multiplierDisplay.innerText = current.toFixed(2) + "x";

            if(current >= crashPoint){
                stopTicker();   
            }
        }, speed);
        };
    };

    function stopTicker(){
        clearInterval(ticker);
        variable = variable - bet;
        variable = Math.round(variable) - 1;
        updateEngine();
        bet = 0;
        betDisplay.innerText = "Bet: 0"
        multiplierDisplay.innerText = "CRASHED💥💥 AT " + current.toFixed(2) + "x";
        crashStopButton.disabled = true;
        crashPointGotten = false;
    };

    function stopTickerPositive(){
        if(crashPurchased == true){
        bet = bet * current;
        variable = variable + bet;
        variable = Math.round(variable) - 1;
        updateEngine();
        clearInterval(ticker);
        crashPointGotten = false;
        bet = 0;
        betDisplay.innerText = "Bet: 0"
        };
    };

    function toggleSettings(){
        document.getElementById("settingSection").classList.toggle("expanded");
    };
    
</script>
    
<div class="game-container">
        <style>
            * { box-sizing: border-box; }

        /* 1. Background & Layout */
        body {
    background: radial-gradient(circle, #1e293b 0%, #0f172a 100%);

    color: white;
    margin: 0;

}

/* THE FIX: Apply flex to the container holding the cards */
.game-container {
    display: flex;
    flex-direction: row;      /* Side-by-side */
    flex-wrap: wrap;          /* Stacks on mobile */
    justify-content: center;  /* Centers cards horizontally */
    align-items: flex-start;  /* Aligns tops of cards */
    gap: 30px;                /* Space between cards */
    padding: 40px 20px;
    width: 100%;
}

/* 2. Main Dashboard Card (Cleaned up) */
.game-card {
    background: rgba(30, 41, 59, 0.7);
    backdrop-filter: blur(10px);
    padding: 2rem;
    border-radius: 24px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.4);
    border: 1px solid rgba(255,255,255,0.1);
    text-align: center;
    
    /* Ensure they don't grow too wide to stay side-by-side */
    width: 100%;
    max-width: 600px; 
    flex: 0 1 auto; 
}

            .vertical-stack {
    display: flex;
    flex-direction: column; /* This container stacks its children */
    gap: 20px;
}

        /* 3. Typography */
        h1, h2, p { margin: 10px 0; }
        .pesos-display {
            font-size: 2.5rem;
            color: #4ade80; /* Money Green */
            text-shadow: 0 0 15px rgba(74, 222, 128, 0.3);
        }
        
        .multiplier {
            font-size: 3.5rem;
            color: #38bdf8;
            font-weight: 800;
        }

        /* 4. The Giant Clicky Button */
        #clickButton {
            background: linear-gradient(135px, #6366f1, #a855f7);
            font-size: 1.5rem !important;
            padding: 30px !important;
            border-radius: 50% !important;
            width: 150px !important;
            height: 150px !important;
            margin: 20px auto !important;
            display: block;
            border: 4px solid rgba(255,255,255,0.2);
            cursor: pointer;
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.4);
            transition: all 0.3s ease;
        }

        #clickButton:hover {
            transform: scale(1.05); /* Grows just a tiny bit */
            filter: brightness(1.5); /* Lights up slightly */
            transition: all 0.2s ease;
        }

        /* 5. General Buttons */
        .btn, button {
            width: 100%;
            padding: 14px;
            margin: 8px 0;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.4s;
            color: white;
            background: #334155; /* Default gray-blue */
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            filter: brightness(1.2);
        }

        button:active:not(:disabled) { transform: scale(0.95); }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            background: #1e293b !important;
        }

        /* Specific Colors */
        #ILIKEMONEY { background: #eab308; color: #000; } /* Gold */
        #buyWorkerButton { background: #22c55e; }
        #makeWorkersWorkButton { background: #3b82f6; }
        #crashStartButton { background: #10b981; }
        #crashStopButton { background: #ef4444; }
        #setBetButton { background: #8b5cf6; }
        #hideLockedButton {
            transform: translateX(15px);
        }
        #secondSetting {
            transform: translateX(15px);
        }
        #settingsButton {
            padding: 16px;
            font-size: 1.5rem;
        }

        #settingSection {
            max-height: 0;
            overflow: hidden;

            transition: max-height 0.35s ease-out;

                position: relative; 
        }

        #settingSection.expanded {
            max-height: 200px;
        }

        #settingSection::before {
            content: "";          /* Required: This tells CSS to 'create' the shape */
            position: absolute;   /* Let us place it anywhere */
            top: 0;               /* Start at the top of the section */
            left: 15px;           /* Adjust this to line up with your Settings button center */
            width: 15px;           /* The thickness of the line */
            height: 100%;         /* Stretches to the bottom of the section */
            background: rgba(255, 255, 255, 0.3); /* Subtle white color */
        }

        #settingsButton:hover {
            transform: scale(1.05); /* Grows just a tiny bit */
            filter: brightness(1.5); /* Lights up slightly */
            transition: all 0.2s ease;
        }

    </style>

        <h2 id="workersOwnedId" style="font-size: 1rem;">Workers Owned🧑🏽‍🌾: 0</h2>

        <button class="btn" id="makeWorkersWorkButton" onclick="
            this.disabled = true;
            this.innerText = 'Wait 3s';
            setTimeout(() => this.innerText = 'Wait 2s', 1000);
            setTimeout(() => this.innerText = 'Wait 1s', 2000);
            setTimeout(() => { this.innerText = 'Start Working ⛏'; this.disabled = false; }, 3000);

        <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin: 20px 0;">

        <h2 id="specialUpgradeLabel" style="font-size: 0.9rem; opacity: 0.6;">SPECIAL UPGRADE: LOCKED🔒</h2>

        <h2 id="sectionTwoLabel" style="font-size: 0.9rem; opacity: 0.6;">SECTION 2: LOCKED🔒</h2>
        <button class="btn" id="buyCrashButton" onclick="buyCrash()">LOCKED🔒</button>
        
        <div id="crash-section">
